<section
  class="relative z-20 -mt-20 mx-auto max-w-[1200px] px-6 md:-mt-24 md:px-10"
  aria-labelledby="features-bar-heading"
>
  <h2 id="features-bar-heading" class="sr-only">Key capabilities at a glance</h2>
  <div class="features-grid">
    @for (item of items; track item.title) {
      <div class="glass-card">
        <div class="feature-icon-ring" aria-hidden="true">
          @switch (item.icon) {
            @case ('secure') {
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"
                />
              </svg>
            }
            @case ('realtime') {
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                />
              </svg>
            }
            @case ('collab') {
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M4.5 4.5a2.25 2.25 0 0 0-1.5.6v.006a2.25 2.25 0 0 0-1.5.6m8.1 0a2.25 2.25 0 0 0-1.5-.6m-6 0a2.25 2.25 0 0 0-1.5.6v.006a2.25 2.25 0 0 0-1.5.6"
                />
              </svg>
            }
            @case ('insight') {
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v4.125c0 .621.504 1.125 1.125 1.125h4.125M3 3v1.5M3 21v-1.5" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5h.75A2.25 2.25 0 0 1 10.5 6v.75M12.75 4.5h.75a2.25 2.25 0 0 1 2.25 2.25v.75M19.5 4.5h.375A2.25 2.25 0 0 1 22.125 6.75v.375" />
              </svg>
            }
          }
        </div>
        <div>
          <h3 class="glass-title font-bold">{{ item.title }}</h3>
          <p class="glass-desc mt-1 text-sm leading-relaxed">{{ item.description }}</p>
        </div>
      </div>
    }
  </div>
</section>
