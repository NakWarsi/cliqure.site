<header class="app-header-bar sticky top-0 z-50" role="banner">
  <div
    class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-6 py-4 md:grid md:grid-cols-[1fr_auto_1fr] md:items-center md:px-10 md:py-4"
  >
    <a routerLink="/" class="flex items-center gap-2.5 no-underline" aria-label="Cliqure home">
      <span class="logo-ring" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
          <defs>
            <linearGradient id="logoGold" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#d4b86e" />
              <stop offset="0.5" stop-color="#c5a059" />
              <stop offset="1" stop-color="#8b6d3a" />
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="16" stroke="url(#logoGold)" stroke-width="3" stroke-opacity="0.35" />
          <path
            d="M30 11.5A12 12 0 1 0 30 28.5"
            stroke="url(#logoGold)"
            stroke-width="3.6"
            stroke-linecap="round"
            fill="none"
          />
        </svg>
      </span>
      <span class="logo-wordmark">cliqure</span>
    </a>
    <nav class="hidden items-center justify-center gap-7 md:flex lg:gap-9" aria-label="Primary">
      <a
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="nav-link-active"
        class="nav-link"
        >Home</a
      >
      <a routerLink="/about" routerLinkActive="nav-link-active" class="nav-link">About Us</a>
      <div class="group relative">
        <a
          routerLink="/product"
          routerLinkActive="nav-link-active"
          class="nav-link inline-flex items-center gap-0.5"
        >
          Product
          <span class="text-xs opacity-70" aria-hidden="true">▾</span>
        </a>
        <div
          class="invisible absolute left-1/2 top-full z-20 mt-1 min-w-[11rem] -translate-x-1/2 rounded-xl border border-primary/10 bg-white/95 py-1 opacity-0 shadow-lg backdrop-blur-sm transition group-hover:visible group-hover:opacity-100 group-focus-within:visible group-focus-within:opacity-100"
          role="menu"
        >
          <a
            routerLink="/product"
            class="block px-4 py-2 text-sm text-slate-700 no-underline hover:bg-primary/5 hover:text-primary"
            >PatientTrack</a
          >
        </div>
      </div>
      <a routerLink="/features" routerLinkActive="nav-link-active" class="nav-link">Features</a>
      <a routerLink="/blog" routerLinkActive="nav-link-active" class="nav-link">Blog</a>
      <a routerLink="/contact" routerLinkActive="nav-link-active" class="nav-link">Contact Us</a>
    </nav>
    <a
      routerLink="/contact"
      class="btn-primary-gradient justify-self-end rounded-2xl px-6 py-2.5 text-sm font-semibold no-underline"
      >Get the App</a
    >
  </div>
</header>
